name: Check BookMyShow Tickets

on:
  schedule:
    # Runs every 15 minutes. Cron is in UTC.
    # GitHub may delay this slightly during busy periods — that's normal.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you click "Run workflow" manually to test

permissions:
  contents: write   # needed so the workflow can save state.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ticket checker
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_bms.py

      - name: Save alert state back to repo
        run: |
          git config user.name "ticket-bot"
          git config user.email "ticket-bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update alert state"
          git push
